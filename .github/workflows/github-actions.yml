name: python app cicd   # Workflow name shown in GitHub Actions UI

on:
  push:                 # Trigger workflow when code is pushed
    branches:
      - main            # Run on pushes to the main branch
      - develop         # Run on pushes to the develop branch
      - 'feature/*'     # Run on pushes to any feature branch
  pull_request:         # Trigger workflow when a pull request is opened/updated
    branches:
      - main            # Run PR checks targeting main
      - develop         # Run PR checks targeting develop
  schedule:             # Trigger workflow on a schedule (cron syntax)
    # Nightly run at 2 AM UTC
    - cron: '0 2 * * *' # Run every day at 02:00 UTC

jobs:
  build:                # Job 1: Build and test the application
    runs-on: ubuntu-latest   # Use GitHub's hosted Ubuntu runner

    strategy:
      max-parallel: 2              # Limit to 2 jobs running at once (avoid rate limits)
      matrix:
        python-version: [3.8, 3.9]   # Run the job against both Python 3.8 and 3.9

    steps:
    - uses: actions/checkout@v3
      # Step 1: Check out the repository code so the workflow has access to it

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}
      # Step 2: Install the specified Python version (from the matrix)

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
      # Step 3: Cache pip packages to speed up installs between runs

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      # Step 4: Upgrade pip and install dependencies from requirements.txt

    - name: Check system resources
      run: |
        echo "CPU info:"
        lscpu
        echo "Memory usage:"
        free -h
        echo "Disk usage:"
        df -h
      # Step 5: Print CPU, memory, and disk usage for debugging resource exhaustion

    - name: Run tests
      run: |
        cd src
        python -m pytest addition.py
      # Step 6: Run the test suite once (plain run) to see immediate results

    - name: Retry flaky tests
      uses: nick-fields/retry@v2
      with:
        max_attempts: 3          # Retry up to 3 times if tests fail
        timeout_minutes: 5       # Each attempt can run for 5 minutes
        retry_wait_seconds: 20   # Wait 20 seconds between retries
        command: |
          cd src
          python -m pytest addition.py
      # Step 7: Run the same test command wrapped in retry logic for resilience

    - name: Build wheel
      run: python setup.py sdist bdist_wheel
      # Step 8: Build distributable Python package (wheel + source distribution)

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: python-app-package
        path: dist/*
      # Step 9: Save build outputs (wheel, sdist) into GitHub’s workflow storage

    - name: Debug with SSH (tmate)
      if: failure()
      uses: mxschmitt/action-tmate@v3
      with:
        limit-access-to-actor: true
      # Step 10: If the job fails, open a live SSH session (tmate) for debugging

  package:              # Job 2: Consume artifacts from build job
    needs: build        # Run only after build job finishes
    runs-on: ubuntu-latest
    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: python-app-package
        path: ./dist
      # Step 1: Retrieve build outputs from workflow storage

    - name: Verify artifact contents
      run: ls -lh ./dist
      # Step 2: Confirm files are present

    - name: Deploy package
      run: echo "🚀 Deploying package from ./dist"
      # Step 3: Use the artifact for deployment or further packaging

  nightly-security-scan:   # Job 3: Nightly security scans
    if: github.event_name == 'schedule'   # Only run when triggered by cron
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      # Step 1: Check out the repository code

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: "3.11"
      # Step 2: Use a stable Python version for scanning

    - name: Install security tools
      run: pip install bandit snyk
      # Step 3: Install Bandit and Snyk for security analysis

    - name: Run Bandit scan
      run: bandit -r src/
      # Step 4: Static analysis for Python security issues

    - name: Run Snyk scan
      run: snyk test --file=requirements.txt
      # Step 5: Dependency vulnerability check against requirements.txt
