name: python app cicd

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest   # Use GitHub's hosted Ubuntu runner

    strategy:
      matrix:
        python-version: [3.8, 3.9]   # Run the job against both Python 3.8 and 3.9

    steps:
    - uses: actions/checkout@v3
      # Step 1: Check out the repository code so the workflow has access to it

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}
      # Step 2: Install the specified Python version (from the matrix)

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
      # Step 3: Aggressive caching for pip packages
      # - Caches the pip download directory (~/.cache/pip)
      # - Cache key is based on OS + hash of requirements.txt
      # - If requirements.txt changes, cache is invalidated and rebuilt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

      # Step 4: Upgrade pip and install dependencies from requirements.txt
      # - With caching, pip reuses previously downloaded wheels to speed up installs

    - name: Check system resources
      run: |
        echo "CPU info:"
        lscpu
        echo "Memory usage:"
        free -h
        echo "Disk usage:"
        df -h
      # Step 5: Print CPU, memory, and disk usage for debugging resource exhaustion

    - name: Run tests
      run: |
        cd src
        python -m pytest addition.py
      # Step 6: Run the test suite once (plain run) to see immediate results

    - name: Retry flaky tests
      uses: nick-fields/retry@v2
      with:
        max_attempts: 3          # Retry up to 3 times if tests fail
        timeout_minutes: 5       # Each attempt can run for 5 minutes
        retry_wait_seconds: 20   # Wait 20 seconds between retries
        command: |
          cd src
          python -m pytest addition.py
      # Step 7: Run the same test command wrapped in retry logic
      # - Provides resilience against flaky tests, race conditions, or transient API/network issues

    - name: Debug with SSH (tmate)   # Step label shown in GitHub Actions logs
      uses: mxschmitt/action-tmate@v3   # Run the tmate action (v3) to open a live SSH session on the runner
      with:
        limit-access-to-actor: true     # Restrict access so only the workflow triggerer (you) can connect

